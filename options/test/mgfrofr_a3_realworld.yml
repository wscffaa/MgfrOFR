name: mgfrofr_a3_realworld
model_type: RTNGANModel
scale: 1
num_gpu: 1
manual_seed: 2021
dist: false
find_unused_parameters: true

datasets:
  test:
    name: RealFilm_SRWOV
    type: Film_SRWOV_dataset
    dataroot_lq: datasets/OldFilmRestoration/val/RealFilm/MambaOFR_SRWOV
    num_frame: -1
    cache_data: true
    normalizing: true
    grayscale: true
    align: 16
    io_backend:
      type: disk

network_g:
  type: MgfrOFR
  num_feat: 16
  num_block: 6
  flow_type: raft
  use_checkpoint: true
  mamba_embed_dim: 64
  mamba_depths: [2, 2, 2]
  mamba_d_state: 16
  mamba_mlp_ratio: 1.2
  mamba_drop_path: 0.0
  use_mgfe: true
  mgfe_num_tokens: 12
  mgfe_num_branches: 3
  mgfe_token_fusion: max

val:
  save_img: true
  val_chunk_size: 30
  metrics:
    niqe:
      type: calculate_niqe
      crop_border: 0
    brisque:
      type: calculate_brisque
      crop_border: 0
    clipiqa:
      type: calculate_clipiqa
      crop_border: 0

logger:
  print_freq: 100

path:
  pretrain_network_g: pretrained/mgfrofr_a3_full.pth
  results_root: results
